<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ClientSt0r</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">ClientSt0r <span>Vault</span></div>
  <button class="header-btn" id="openOptionsBtn" title="Settings">&#9881;</button>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-tab="passwords">Passwords</div>
  <div class="tab" data-tab="assets">Assets</div>
  <div class="tab" data-tab="notifications">
    Alerts<span class="tab-badge" id="notifBadge" style="display:none">0</span>
  </div>
</div>

<!-- ── Passwords Pane ────────────────────────────────────────────── -->
<div class="pane active" id="pane-passwords">
  <div class="search-bar">
    <input type="text" id="pwSearch" placeholder="Search passwords…" autocomplete="off" />
  </div>
  <div class="list" id="pwList">
    <div class="loading"><span class="spinner"></span>Loading…</div>
  </div>
  <div class="footer">
    <a href="#" id="pwAddNew">+ Add new password</a>
  </div>
</div>

<!-- ── Assets Pane ───────────────────────────────────────────────── -->
<div class="pane" id="pane-assets">
  <div class="search-bar">
    <input type="text" id="assetSearch" placeholder="Search assets…" autocomplete="off" />
  </div>
  <div class="list" id="assetList">
    <div class="loading"><span class="spinner"></span>Loading…</div>
  </div>
  <div class="footer">
    <a href="#" id="assetAddNew">+ Add new asset</a>
  </div>
</div>

<!-- ── Notifications Pane ────────────────────────────────────────── -->
<div class="pane" id="pane-notifications">
  <div class="list" id="notifList">
    <div class="loading"><span class="spinner"></span>Loading…</div>
  </div>
  <div class="footer">
    <a href="#" id="notifRefresh">Refresh</a>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
