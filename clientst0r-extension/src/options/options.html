<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClientSt0r Extension — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
    }
    .container { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f0f6fc; }
    .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.9rem; color: #c9d1d9; }
    input[type="text"], input[type="password"], input[type="url"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #58a6ff; }
    .hint { font-size: 0.8rem; color: #8b949e; margin-top: 0.3rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #238636; color: #fff; }
    .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    .btn-row { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    #status {
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
    }
    #status.ok  { background: #0d4429; color: #56d364; border: 1px solid #1a7f37; display: block; }
    #status.err { background: #490202; color: #ffa198; border: 1px solid #b62324; display: block; }
    #status.info { background: #1c2c45; color: #79c0ff; border: 1px solid #1158c7; display: block; }
  </style>
</head>
<body>
<div class="container">
  <h1>ClientSt0r Extension</h1>
  <p class="subtitle">Configure your server connection to enable password autofill and asset search.</p>

  <div class="card">
    <div style="margin-bottom: 1.25rem;">
      <label for="serverUrl">Server URL</label>
      <input type="url" id="serverUrl" placeholder="https://clientst0r.app" />
      <p class="hint">Your ClientSt0r instance URL. For self-hosted installs, use your server address.</p>
    </div>
    <div>
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="itdocs_live_…" autocomplete="off" />
      <p class="hint">Generate an API key from <strong>Settings → API Keys</strong> in your ClientSt0r account.</p>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="saveBtn">Save Settings</button>
      <button class="btn btn-secondary" id="testBtn">Test Connection</button>
    </div>

    <div id="status"></div>
  </div>
</div>

<script src="options.js"></script>
</body>
</html>
