name: Bug report
description: Report a bug in ClientSt0r
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: "1. Go to...\n2. Click...\n3. See error"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of ClientSt0r are you running?
      placeholder: "e.g. 3.13.15"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, any relevant config
    validations:
      required: false
