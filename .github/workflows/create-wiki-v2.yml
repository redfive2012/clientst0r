name: Initialize Wiki v2
on:
  workflow_dispatch:

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Try to push to wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          echo "Testing wiki URL..."
          git ls-remote "$WIKI_URL" 2>&1 || echo "ls-remote failed (expected if uninitialized)"
          
          mkdir wiki-init
          cd wiki-init
          git init
          git checkout -b master
          echo "# ClientSt0r Wiki" > Home.md
          echo "" >> Home.md
          echo "Welcome to the ClientSt0r wiki." >> Home.md
          git add Home.md
          git commit -m "Initialize wiki"
          
          echo "Attempting push..."
          git remote add origin "${WIKI_URL}"
          git push origin master 2>&1
          echo "Exit code: $?"
