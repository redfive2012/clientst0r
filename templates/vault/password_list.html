{% extends "base.html" %}

{% block title %}Passwords{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-key"></i> Password Vault</h1>
    <a href="{% url 'vault:password_create' %}" class="btn btn-primary"><i class="fas fa-plus"></i> Add Password</a>
</div>

<div class="card">
    <div class="card-body">
        <table id="passwordTable" class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Username</th>
                    <th>URL</th>
                    <th>Type</th>
                    <th>Security</th>
                    <th>Tags</th>
                    <th width="100">Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data loaded via AJAX for better performance -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    $('#passwordTable').DataTable({
        serverSide: true,
        processing: true,
        ajax: {
            url: '{% url "vault:password_list_datatables" %}',
            type: 'GET'
        },
        columns: [
            { data: 0, name: 'title' },
            { data: 1, name: 'username' },
            { data: 2, name: 'url', orderable: false },
            { data: 3, name: 'password_type' },
            { data: 4, name: 'password_status' },
            { data: 5, name: 'tags', orderable: false },
            { data: 6, name: 'actions', orderable: false, searchable: false }
        ],
        order: [[0, 'asc']],
        pageLength: 50,
        lengthMenu: [[25, 50, 100, 250], [25, 50, 100, 250]],
        language: {
            search: "_INPUT_",
            searchPlaceholder: "Search passwords...",
            processing: '<i class="fas fa-spinner fa-spin fa-2x"></i><br>Loading passwords...',
            emptyTable: '<i class="fas fa-inbox"></i> No passwords found. <a href="{% url "vault:password_create" %}">Create one</a>.',
            zeroRecords: '<i class="fas fa-search"></i> No matching passwords found.',
            info: 'Showing _START_ to _END_ of _TOTAL_ passwords',
            infoEmpty: 'No passwords available',
            infoFiltered: '(filtered from _MAX_ total passwords)'
        }
    });
});
</script>
{% endblock %}
