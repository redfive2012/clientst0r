<svg id="damage-svg-rear" class="damage-diagram-svg" width="560" height="400" viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-height:340px;">
  <defs>
    <linearGradient id="vrbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8e4f0"/>
      <stop offset="40%" stop-color="#eef4fc"/>
      <stop offset="100%" stop-color="#8898b0"/>
    </linearGradient>
    <linearGradient id="vrwin" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#b0d0f0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3070b0" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="vrtire" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#4a4a4a"/><stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <radialGradient id="vrhub" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e0e0e0"/><stop offset="100%" stop-color="#808080"/>
    </radialGradient>
    <style>.damage-diagram-svg [data-area]{cursor:pointer}.damage-diagram-svg [data-area]:hover{opacity:0.75}</style>
  </defs>

  <ellipse cx="280" cy="385" rx="230" ry="10" fill="#00000020"/>

  <!-- Body -->
  <rect x="72" y="88" width="416" height="250" rx="8" fill="url(#vrbg)" stroke="#8898b0" stroke-width="2"/>
  <!-- Roof -->
  <rect x="90" y="60" width="380" height="50" rx="10" fill="#ccdaea" stroke="#aabece" stroke-width="1.5"/>
  <rect data-area="Roof" x="90" y="55" width="380" height="55" rx="10" fill="rgba(255,255,255,0)" stroke="none"/>

  <!-- Rear bumper -->
  <rect x="60" y="310" width="440" height="50" rx="8" fill="#4a5568" stroke="#2d3748" stroke-width="2"/>
  <rect data-area="Rear Bumper" x="60" y="310" width="440" height="50" rx="8" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="160" y="318" width="240" height="8" rx="3" fill="#3a4050" opacity="0.7"/>
  <rect x="160" y="330" width="240" height="6" rx="3" fill="#3a4050" opacity="0.5"/>

  <!-- ===== REAR DOORS (two-door cargo) ===== -->
  <!-- Center gap -->
  <line x1="280" y1="88" x2="280" y2="335" stroke="#7a8898" stroke-width="3"/>
  <!-- Left door -->
  <rect x="74" y="90" width="202" height="242" rx="4" fill="#cad6e6" stroke="#9aaabf" stroke-width="1"/>
  <rect data-area="Rear Doors" x="74" y="88" width="412" height="250" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>
  <!-- Right door -->
  <rect x="284" y="90" width="202" height="242" rx="4" fill="#ccd8e8" stroke="#9aaabf" stroke-width="1"/>
  <!-- Door handles -->
  <rect x="232" y="208" width="42" height="10" rx="5" fill="#7a8a9a" stroke="#5a6a7a" stroke-width="1"/>
  <rect x="286" y="208" width="42" height="10" rx="5" fill="#7a8a9a" stroke="#5a6a7a" stroke-width="1"/>
  <!-- Horizontal door crease -->
  <line x1="76" y1="188" x2="486" y2="188" stroke="#9aaabf" stroke-width="1" opacity="0.5"/>

  <!-- ===== REAR WINDOW ===== -->
  <rect data-area="Rear Window" x="120" y="102" width="140" height="80" rx="6" fill="url(#vrwin)" stroke="#507888" stroke-width="1.5"/>
  <rect data-area="Rear Window" x="300" y="102" width="140" height="80" rx="6" fill="url(#vrwin)" stroke="#507888" stroke-width="1.5"/>

  <!-- ===== TAIL LIGHTS ===== -->
  <rect data-area="Taillight (L)" x="72" y="100" width="22" height="70" rx="5" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="74" y="102" width="18" height="68" rx="4" fill="#cc1818" stroke="#991010" stroke-width="1.5"/>
  <rect x="76" y="104" width="14" height="30" rx="2" fill="#ff3030" opacity="0.7"/>
  <rect x="76" y="136" width="14" height="16" rx="2" fill="#ff8800" opacity="0.65"/>

  <rect data-area="Taillight (R)" x="466" y="100" width="22" height="70" rx="5" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="468" y="102" width="18" height="68" rx="4" fill="#cc1818" stroke="#991010" stroke-width="1.5"/>
  <rect x="470" y="104" width="14" height="30" rx="2" fill="#ff3030" opacity="0.7"/>
  <rect x="470" y="136" width="14" height="16" rx="2" fill="#ff8800" opacity="0.65"/>

  <!-- Reverse lights -->
  <rect data-area="Reverse Light (L)" x="96" y="175" width="50" height="20" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="98" y="177" width="46" height="16" rx="3" fill="#e0e8f0" stroke="#a0b0c0" stroke-width="1"/>
  <rect data-area="Reverse Light (R)" x="414" y="175" width="50" height="20" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="416" y="177" width="46" height="16" rx="3" fill="#e0e8f0" stroke="#a0b0c0" stroke-width="1"/>

  <!-- ===== WHEELS ===== -->
  <circle cx="96" cy="348" r="44" fill="url(#vrtire)" stroke="#181818" stroke-width="2"/>
  <circle cx="96" cy="348" r="30" fill="#2a2a2a"/>
  <circle cx="96" cy="348" r="22" fill="url(#vrhub)"/>
  <circle cx="96" cy="348" r="7" fill="#aaa"/>
  <circle data-area="Rear Left Wheel" cx="96" cy="348" r="44" fill="rgba(255,255,255,0)" stroke="none"/>

  <circle cx="464" cy="348" r="44" fill="url(#vrtire)" stroke="#181818" stroke-width="2"/>
  <circle cx="464" cy="348" r="30" fill="#2a2a2a"/>
  <circle cx="464" cy="348" r="22" fill="url(#vrhub)"/>
  <circle cx="464" cy="348" r="7" fill="#aaa"/>
  <circle data-area="Rear Right Wheel" cx="464" cy="348" r="44" fill="rgba(255,255,255,0)" stroke="none"/>
</svg>
