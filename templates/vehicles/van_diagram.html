  <rect data-area="Rear Quarter Panel" x="590" y="95" width="125" height="145" rx="2" fill="#718096" stroke="#2d3748" stroke-width="2"/>

  <g font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0" opacity="0.7" text-anchor="middle">

    <text x="335" y="85">Driver Door</text>
    <text x="502" y="85">Cargo Door</text>
    <text x="652" y="85">Rear Quarter</text>
    <text x="736" y="85">Rear</text>
    <text x="165" y="310">Front Wheel</text>
    <text x="630" y="310">Rear Wheel</text>
