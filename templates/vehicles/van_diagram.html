      <stop offset="70%" stop-color="#c0d0e4"/>
      <stop offset="100%" stop-color="#8898b0"/>

    <linearGradient id="vwin-driver" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#a0c8e8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2860a0" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="vtire1" cx="45%" cy="38%" r="55%">

      <stop offset="100%" stop-color="#111"/>

      <stop offset="100%" stop-color="#808080"/>
    </radialGradient>
    <filter id="vdrop" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000030"/>
    </filter>
    <style>
      .damage-diagram-svg [data-area] { cursor:pointer; }
      .damage-diagram-svg [data-area]:hover { opacity:0.75; }
    </style>
  </defs>

  <ellipse cx="450" cy="320" rx="390" ry="13" fill="#00000020"/>

  <rect x="235" y="88" width="600" height="178" rx="4" fill="url(#vbg-driver)" stroke="#8898b0" stroke-width="1.5" filter="url(#vdrop)"/>

  <!-- Cab front face -->

  <path d="M 204,96 L 234,94 L 234,182 L 204,182 Z" fill="rgba(255,255,255,0.1)"/>

  <ellipse cx="112" cy="143" rx="15" ry="11" fill="white" opacity="0.55"/>
  <ellipse cx="112" cy="143" rx="8" ry="6" fill="#ffee88" opacity="0.4"/>

  <rect data-area="DRL (L)" x="84" y="188" width="28" height="10" rx="3" fill="#f4d840" stroke="#c0a820" stroke-width="1"/>

  <rect x="826" y="134" width="16" height="16" rx="2" fill="#ff8800" opacity="0.65"/>

  <circle cx="755" cy="138" r="5" fill="#6a7888"/>

  <rect x="235" y="72" width="600" height="18" rx="3" fill="#ccdaea" stroke="#aabece" stroke-width="1"/>

  <!-- ===== BODY CHARACTER LINE ===== -->
  <path d="M 200,158 L 834,158" stroke="#a0b4c8" stroke-width="1.5" opacity="0.4"/>

  <!-- Front wheel -->
  <circle cx="192" cy="278" r="58" fill="url(#vtire1)" stroke="#181818" stroke-width="2.5"/>
  <circle cx="192" cy="278" r="42" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="192" cy="278" r="31" fill="url(#vhub1)"/>

  <circle cx="655" cy="278" r="31" fill="url(#vhub1)"/>

  <circle cx="679" cy="292" r="4.5" fill="#888"/><circle cx="655" cy="304" r="4.5" fill="#888"/>
  <circle cx="631" cy="292" r="4.5" fill="#888"/><circle cx="631" cy="264" r="4.5" fill="#888"/>

  <path d="M 130,266 A 68,68 0 0,1 254,266" fill="none" stroke="#606878" stroke-width="3"/>
  <path d="M 593,266 A 68,68 0 0,1 717,266" fill="none" stroke="#606878" stroke-width="3"/>
