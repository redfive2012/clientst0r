<svg id="damage-svg-top" class="damage-diagram-svg" width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-height:300px;">
  <defs>
    <linearGradient id="ptopbg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e4eef8"/>
      <stop offset="100%" stop-color="#b8cce0"/>
    </linearGradient>
    <linearGradient id="ptopbg2" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#b8cce0"/>
      <stop offset="50%" stop-color="#d8e8f4"/>
      <stop offset="100%" stop-color="#b8cce0"/>
    </linearGradient>
    <linearGradient id="ptopbed" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#9aaabf"/>
      <stop offset="50%" stop-color="#b0c2d8"/>
      <stop offset="100%" stop-color="#9aaabf"/>
    </linearGradient>
    <radialGradient id="ptoptire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a3a3a"/><stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <style>.damage-diagram-svg [data-area]{cursor:pointer}.damage-diagram-svg [data-area]:hover{opacity:0.75}</style>
  </defs>

  <!-- ===== TRUCK BED (rear open section) ===== -->
  <!-- Bed outer walls -->
  <rect x="480" y="80" width="360" height="240" rx="8" fill="url(#ptopbed)" stroke="#7888a0" stroke-width="2"/>
  <!-- Bed interior (darker, open) -->
  <rect x="500" y="95" width="320" height="210" rx="4" fill="#7888a0" opacity="0.7"/>
  <!-- Bed floor texture lines -->
  <line x1="500" y1="130" x2="820" y2="130" stroke="#8898b0" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="165" x2="820" y2="165" stroke="#8898b0" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="200" x2="820" y2="200" stroke="#8898b0" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="235" x2="820" y2="235" stroke="#8898b0" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="270" x2="820" y2="270" stroke="#8898b0" stroke-width="1" opacity="0.4"/>
  <rect data-area="Truck Bed" x="480" y="80" width="360" height="240" rx="8" fill="rgba(255,255,255,0)" stroke="none"/>

  <!-- ===== CAB (front section) ===== -->
  <!-- Cab top view (slightly tapered at front) -->
  <path d="M 100,130 C 100,110 115,92 135,90 L 480,85 L 480,315 L 135,310 C 115,308 100,290 100,270 Z" fill="url(#ptopbg2)" stroke="#8090a8" stroke-width="2"/>

  <!-- Cab roof detail -->
  <rect data-area="Roof / Cab Top" x="220" y="88" width="260" height="224" rx="8" fill="rgba(255,255,255,0)" stroke="none"/>
  <!-- Cab roof center line -->
  <line x1="100" y1="200" x2="480" y2="200" stroke="#a0b0c4" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.4"/>

  <!-- ===== WINDSHIELD (from top) ===== -->
  <rect data-area="Windshield" x="200" y="122" width="50" height="156" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="202" y="124" width="46" height="152" rx="4" fill="#80b0d8" opacity="0.65" stroke="#5070a0" stroke-width="1"/>

  <!-- ===== HOOD (from top) ===== -->
  <path data-area="Hood" d="M 100,140 L 200,128 L 200,272 L 100,260 Z" fill="rgba(255,255,255,0)" stroke="none"/>
  <path d="M 102,142 L 200,130 L 200,270 L 102,258 Z" fill="#b8cce0" stroke="#98aec4" stroke-width="1" opacity="0.75"/>
  <!-- Hood power dome visible from top -->
  <ellipse cx="152" cy="200" rx="24" ry="60" fill="#c8d8ec" stroke="#a0b4c8" stroke-width="1" opacity="0.5"/>

  <!-- ===== BUMPERS ===== -->
  <rect data-area="Front Bumper" x="78" y="155" width="30" height="90" rx="5" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="80" y="157" width="26" height="86" rx="4" fill="#3a4558" stroke="#2d3748" stroke-width="1.5"/>
  <rect data-area="Rear Bumper" x="840" y="155" width="32" height="90" rx="5" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="842" y="157" width="28" height="86" rx="4" fill="#3a4558" stroke="#2d3748" stroke-width="1.5"/>
  <!-- Trailer hitch visible from top -->
  <rect x="842" y="192" width="28" height="16" rx="3" fill="#2a3040" stroke="#404858" stroke-width="1"/>

  <!-- ===== TAILGATE (from top, thin strip) ===== -->
  <rect x="836" y="82" width="10" height="236" rx="3" fill="#7a8a9a" stroke="#6070a0" stroke-width="1"/>
  <rect data-area="Tailgate" x="836" y="82" width="10" height="236" rx="3" fill="rgba(255,255,255,0)" stroke="none"/>

  <!-- ===== BED RAILS (from top) ===== -->
  <rect x="480" y="82" width="360" height="12" rx="3" fill="#9aaabf" stroke="#7888a0" stroke-width="1"/>
  <rect x="480" y="306" width="360" height="12" rx="3" fill="#9aaabf" stroke="#7888a0" stroke-width="1"/>

  <!-- ===== SIDE MIRRORS ===== -->
  <ellipse data-area="Driver Side Mirror" cx="172" cy="100" rx="22" ry="12" fill="#9aaabf" stroke="#7a8a9f" stroke-width="1.5"/>
  <ellipse data-area="Passenger Side Mirror" cx="172" cy="300" rx="22" ry="12" fill="#9aaabf" stroke="#7a8a9f" stroke-width="1.5"/>

  <!-- ===== CLICKABLE SIDES ===== -->
  <rect data-area="Driver Side" x="220" y="82" width="260" height="28" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect data-area="Passenger Side" x="220" y="290" width="260" height="28" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>

  <!-- ===== WHEELS (from top, ovals) ===== -->
  <!-- Front left (driver side front) -->
  <ellipse data-area="Front Left Wheel" cx="170" cy="130" rx="18" ry="36" fill="url(#ptoptire)" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="170" cy="130" rx="10" ry="22" fill="#555"/>
  <!-- Front right (passenger side front) -->
  <ellipse data-area="Front Right Wheel" cx="170" cy="270" rx="18" ry="36" fill="url(#ptoptire)" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="170" cy="270" rx="10" ry="22" fill="#555"/>
  <!-- Rear left (driver side rear) -->
  <ellipse data-area="Rear Left Wheel" cx="760" cy="130" rx="18" ry="36" fill="url(#ptoptire)" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="760" cy="130" rx="10" ry="22" fill="#555"/>
  <!-- Rear right (passenger side rear) -->
  <ellipse data-area="Rear Right Wheel" cx="760" cy="270" rx="18" ry="36" fill="url(#ptoptire)" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="760" cy="270" rx="10" ry="22" fill="#555"/>

  <!-- Direction indicator -->
  <text x="50" y="210" font-size="13" fill="#8090b8" font-family="sans-serif" text-anchor="middle" transform="rotate(-90,50,210)">FRONT →</text>
</svg>
