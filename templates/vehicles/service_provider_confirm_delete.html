{% extends "base.html" %}
{% block title %}Remove Service Provider{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white"><h5 class="mb-0"><i class="fas fa-trash"></i> Remove Service Provider</h5></div>
            <div class="card-body">
                <p>Remove <strong>{{ provider.name }}</strong> from <strong>{{ vehicle.display_name }}</strong>?</p>
                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Remove</button>
                    <a href="{% url 'vehicles:vehicle_detail' vehicle.pk %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
