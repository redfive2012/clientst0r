<svg id="damage-svg-front" class="damage-diagram-svg" width="560" height="400" viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-height:340px;">
  <defs>
    <linearGradient id="vfbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8e4f0"/>
      <stop offset="40%" stop-color="#eef4fc"/>
      <stop offset="100%" stop-color="#8898b0"/>
    </linearGradient>
    <linearGradient id="vfwin" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#b0d0f0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3070b0" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="vftire" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#4a4a4a"/><stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <radialGradient id="vfhub" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e0e0e0"/><stop offset="100%" stop-color="#808080"/>
    </radialGradient>
    <style>.damage-diagram-svg [data-area]{cursor:pointer}.damage-diagram-svg [data-area]:hover{opacity:0.75}</style>
  </defs>

  <!-- Shadow -->
  <ellipse cx="280" cy="385" rx="230" ry="10" fill="#00000020"/>

  <!-- ===== BODY FRONT FACE ===== -->
  <!-- Main body rectangle -->
  <rect x="72" y="88" width="416" height="250" rx="8" fill="url(#vfbg)" stroke="#8898b0" stroke-width="2"/>
  <!-- Roof rounded top -->
  <rect x="90" y="60" width="380" height="50" rx="10" fill="#ccdaea" stroke="#aabece" stroke-width="1.5"/>
  <!-- Roof section -->
  <rect data-area="Roof" x="90" y="55" width="380" height="55" rx="10" fill="rgba(255,255,255,0)" stroke="none"/>

  <!-- Bumper -->
  <rect x="60" y="310" width="440" height="50" rx="8" fill="#4a5568" stroke="#2d3748" stroke-width="2"/>
  <rect data-area="Front Bumper" x="60" y="310" width="440" height="50" rx="8" fill="rgba(255,255,255,0)" stroke="none"/>
  <!-- Bumper grille slots -->
  <rect x="160" y="318" width="240" height="8" rx="3" fill="#3a4050" opacity="0.8"/>
  <rect x="160" y="330" width="240" height="6" rx="3" fill="#3a4050" opacity="0.6"/>
  <rect x="160" y="340" width="240" height="6" rx="3" fill="#3a4050" opacity="0.5"/>

  <!-- ===== GRILLE ===== -->
  <rect data-area="Grille" x="140" y="270" width="280" height="48" rx="6" fill="rgba(255,255,255,0)" stroke="none"/>
  <!-- Grille visual -->
  <rect x="142" y="272" width="276" height="44" rx="5" fill="#2a3040" stroke="#404858" stroke-width="2"/>
  <rect x="148" y="278" width="264" height="6" rx="2" fill="#353d50" opacity="0.9"/>
  <rect x="148" y="288" width="264" height="6" rx="2" fill="#353d50" opacity="0.8"/>
  <rect x="148" y="298" width="264" height="6" rx="2" fill="#353d50" opacity="0.7"/>

  <!-- ===== HOOD ===== -->
  <rect data-area="Hood" x="80" y="230" width="400" height="50" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>
  <!-- Hood panel -->
  <rect x="82" y="232" width="396" height="46" rx="4" fill="#c8d8e8" stroke="#a0b4c8" stroke-width="1"/>
  <!-- Hood crease -->
  <line x1="280" y1="232" x2="280" y2="278" stroke="#a8b8cc" stroke-width="1.5" opacity="0.5"/>

  <!-- ===== WINDSHIELD ===== -->
  <rect data-area="Windshield" x="100" y="98" width="360" height="140" rx="8" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="102" y="100" width="356" height="136" rx="7" fill="url(#vfwin)" stroke="#508090" stroke-width="2"/>
  <!-- Wipers -->
  <path d="M 130,232 C 160,210 220,202 260,200" stroke="#404858" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 290,200 C 330,200 380,208 415,228" stroke="#404858" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ===== HEADLIGHTS ===== -->
  <!-- Left headlight -->
  <rect data-area="Headlight (L)" x="72" y="150" width="90" height="88" rx="8" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="74" y="152" width="86" height="84" rx="7" fill="#f4f2a0" stroke="#c8c030" stroke-width="2"/>
  <ellipse cx="117" cy="194" rx="28" ry="22" fill="white" opacity="0.5"/>
  <ellipse cx="117" cy="194" rx="16" ry="13" fill="#ffe060" opacity="0.4"/>

  <!-- Right headlight -->
  <rect data-area="Headlight (R)" x="398" y="150" width="90" height="88" rx="8" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="400" y="152" width="86" height="84" rx="7" fill="#f4f2a0" stroke="#c8c030" stroke-width="2"/>
  <ellipse cx="443" cy="194" rx="28" ry="22" fill="white" opacity="0.5"/>
  <ellipse cx="443" cy="194" rx="16" ry="13" fill="#ffe060" opacity="0.4"/>

  <!-- ===== DRL ===== -->
  <rect data-area="DRL (L)" x="76" y="246" width="58" height="12" rx="5" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="78" y="248" width="54" height="8" rx="4" fill="#f4d040" stroke="#c0a020" stroke-width="1"/>

  <rect data-area="DRL (R)" x="426" y="246" width="58" height="12" rx="5" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="428" y="248" width="54" height="8" rx="4" fill="#f4d040" stroke="#c0a020" stroke-width="1"/>

  <!-- ===== SIDE MIRRORS ===== -->
  <ellipse data-area="Driver Side Mirror" cx="55" cy="170" rx="20" ry="13" fill="#9aaabf" stroke="#7a8a9f" stroke-width="1.5"/>
  <ellipse cx="53" cy="168" rx="13" ry="9" fill="url(#vfwin)" opacity="0.7"/>

  <ellipse data-area="Passenger Side Mirror" cx="505" cy="170" rx="20" ry="13" fill="#9aaabf" stroke="#7a8a9f" stroke-width="1.5"/>
  <ellipse cx="503" cy="168" rx="13" ry="9" fill="url(#vfwin)" opacity="0.7"/>

  <!-- ===== WHEELS ===== -->
  <!-- Left front wheel (partially visible) -->
  <circle cx="96" cy="348" r="44" fill="url(#vftire)" stroke="#181818" stroke-width="2"/>
  <circle cx="96" cy="348" r="30" fill="#2a2a2a"/>
  <circle cx="96" cy="348" r="22" fill="url(#vfhub)"/>
  <circle cx="96" cy="348" r="7" fill="#aaa"/>

  <!-- Right front wheel -->
  <circle cx="464" cy="348" r="44" fill="url(#vftire)" stroke="#181818" stroke-width="2"/>
  <circle cx="464" cy="348" r="30" fill="#2a2a2a"/>
  <circle cx="464" cy="348" r="22" fill="url(#vfhub)"/>
  <circle cx="464" cy="348" r="7" fill="#aaa"/>

  <!-- Wheel zones -->
  <circle data-area="Front Left Wheel" cx="96" cy="348" r="44" fill="rgba(255,255,255,0)" stroke="none"/>
  <circle data-area="Front Right Wheel" cx="464" cy="348" r="44" fill="rgba(255,255,255,0)" stroke="none"/>
</svg>
