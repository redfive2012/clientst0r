<svg id="damage-svg-front" class="damage-diagram-svg" width="800" height="370" viewBox="0 0 800 370" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-height:260px;">
  <style>
    #damage-svg-front [data-area] { cursor: pointer; transition: opacity 0.15s; }
    #damage-svg-front [data-area]:hover { opacity: 0.75; }
  </style>

  <!-- Shadow -->
  <ellipse cx="400" cy="358" rx="310" ry="10" fill="#00000022"/>

  <!-- Roof strip (top edge) -->
  <rect data-area="Roof" x="120" y="5" width="560" height="26" rx="6" fill="#718096" stroke="#2d3748" stroke-width="2"/>

  <!-- Left body panel (driver side) -->
  <rect x="120" y="30" width="62" height="225" fill="#718096" stroke="#2d3748" stroke-width="2"/>

  <!-- Right body panel (passenger side) -->
  <rect x="618" y="30" width="62" height="225" fill="#718096" stroke="#2d3748" stroke-width="2"/>

  <!-- Windshield (trapezoidal — wider at top, van/cab-over style) -->
  <polygon data-area="Windshield" points="182,31 618,31 592,152 208,152" fill="#90cdf4" stroke="#2d3748" stroke-width="1.5" opacity="0.8"/>

  <!-- Hood -->
  <rect data-area="Hood" x="208" y="152" width="384" height="106" rx="2" fill="#8898aa" stroke="#2d3748" stroke-width="2"/>

  <!-- Grille (dark inset) -->
  <rect data-area="Grille" x="292" y="192" width="216" height="64" rx="6" fill="#1a202c" stroke="#475569" stroke-width="1.5"/>
  <!-- Grille bars -->
  <line x1="292" y1="212" x2="508" y2="212" stroke="#2d3748" stroke-width="1.5"/>
  <line x1="292" y1="228" x2="508" y2="228" stroke="#2d3748" stroke-width="1.5"/>
  <line x1="292" y1="244" x2="508" y2="244" stroke="#2d3748" stroke-width="1.5"/>

  <!-- Front Bumper -->
  <rect data-area="Front Bumper" x="112" y="256" width="576" height="32" rx="5" fill="#4a5568" stroke="#2d3748" stroke-width="2"/>

  <!-- Left Headlight (driver side — LEFT from viewer) -->
  <rect data-area="Headlight (L)" x="124" y="85" width="66" height="88" rx="8" fill="#fbbf24" stroke="#2d3748" stroke-width="1.5"/>
  <!-- Headlight inner -->
  <ellipse cx="157" cy="129" rx="24" ry="30" fill="#fde68a" opacity="0.6"/>

  <!-- Right Headlight (passenger side — RIGHT from viewer) -->
  <rect data-area="Headlight (R)" x="610" y="85" width="66" height="88" rx="8" fill="#fbbf24" stroke="#2d3748" stroke-width="1.5"/>
  <ellipse cx="643" cy="129" rx="24" ry="30" fill="#fde68a" opacity="0.6"/>

  <!-- Left DRL -->
  <rect data-area="DRL (L)" x="124" y="175" width="66" height="18" rx="4" fill="#fde68a" stroke="#2d3748" stroke-width="1"/>

  <!-- Right DRL -->
  <rect data-area="DRL (R)" x="610" y="175" width="66" height="18" rx="4" fill="#fde68a" stroke="#2d3748" stroke-width="1"/>

  <!-- Driver Side Mirror (sticks out left) -->
  <rect data-area="Driver Side Mirror" x="55" y="52" width="65" height="24" rx="4" fill="#4a5568" stroke="#2d3748" stroke-width="1.5"/>
  <line x1="120" y1="64" x2="133" y2="66" stroke="#2d3748" stroke-width="2"/>

  <!-- Passenger Side Mirror (sticks out right) -->
  <rect data-area="Passenger Side Mirror" x="680" y="52" width="65" height="24" rx="4" fill="#4a5568" stroke="#2d3748" stroke-width="1.5"/>
  <line x1="680" y1="64" x2="667" y2="66" stroke="#2d3748" stroke-width="2"/>

  <!-- Left Front Wheel (partially visible) -->
  <circle data-area="Front Left Wheel" cx="87" cy="326" r="42" fill="#1a202c" stroke="#718096" stroke-width="4"/>
  <circle cx="87" cy="326" r="20" fill="#4a5568"/>
  <circle cx="87" cy="326" r="8" fill="#718096"/>
  <!-- Arch mask -->
  <path d="M 45 285 Q 48 254 87 252 Q 126 254 129 285" fill="#2d3748"/>
  <rect x="0" y="270" width="178" height="30" fill="#1e293b"/>

  <!-- Right Front Wheel -->
  <circle data-area="Front Right Wheel" cx="713" cy="326" r="42" fill="#1a202c" stroke="#718096" stroke-width="4"/>
  <circle cx="713" cy="326" r="20" fill="#4a5568"/>
  <circle cx="713" cy="326" r="8" fill="#718096"/>
  <path d="M 671 285 Q 674 254 713 252 Q 752 254 755 285" fill="#2d3748"/>
  <rect x="622" y="270" width="178" height="30" fill="#1e293b"/>

  <!-- License plate -->
  <rect x="350" y="228" width="100" height="26" rx="3" fill="#e2e8f0" stroke="#2d3748" stroke-width="1"/>

  <!-- Labels -->
  <g font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0" opacity="0.7" text-anchor="middle">
    <text x="157" y="78">Headlight (L)</text>
    <text x="643" y="78">Headlight (R)</text>
    <text x="157" y="208">Driver Side</text>
    <text x="643" y="208">Pass. Side</text>
    <text x="87" y="362">Front L Wheel</text>
    <text x="713" y="362">Front R Wheel</text>
  </g>
</svg>
