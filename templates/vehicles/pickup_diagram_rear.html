<svg id="damage-svg-rear" class="damage-diagram-svg" width="560" height="400" viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-height:340px;">
  <defs>
    <linearGradient id="prbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0dcea"/>
      <stop offset="40%" stop-color="#eaf2fc"/>
      <stop offset="100%" stop-color="#8090a8"/>
    </linearGradient>
    <linearGradient id="prbed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8b8cc"/>
      <stop offset="100%" stop-color="#7888a0"/>
    </linearGradient>
    <radialGradient id="prtire" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#4a4a4a"/><stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <radialGradient id="prhub" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e0e0e0"/><stop offset="100%" stop-color="#808080"/>
    </radialGradient>
    <style>.damage-diagram-svg [data-area]{cursor:pointer}.damage-diagram-svg [data-area]:hover{opacity:0.75}</style>
  </defs>

  <ellipse cx="280" cy="385" rx="230" ry="10" fill="#00000020"/>

  <!-- ===== MAIN BODY ===== -->
  <rect x="72" y="88" width="416" height="250" rx="8" fill="url(#prbg)" stroke="#8090a8" stroke-width="2"/>
  <!-- Roof -->
  <rect x="90" y="60" width="380" height="50" rx="10" fill="#ccdaea" stroke="#aabece" stroke-width="1.5"/>
  <rect data-area="Roof" x="90" y="55" width="380" height="55" rx="10" fill="rgba(255,255,255,0)" stroke="none"/>

  <!-- Rear bumper (heavier for pickup) -->
  <rect x="55" y="308" width="450" height="55" rx="8" fill="#3a4558" stroke="#2d3748" stroke-width="2"/>
  <rect data-area="Rear Bumper" x="55" y="308" width="450" height="55" rx="8" fill="rgba(255,255,255,0)" stroke="none"/>
  <!-- Bumper chrome strip -->
  <rect x="60" y="311" width="440" height="6" rx="3" fill="#8090a8" opacity="0.6"/>
  <!-- Trailer hitch -->
  <rect x="252" y="340" width="56" height="18" rx="4" fill="#2a3040" stroke="#404858" stroke-width="1.5"/>
  <circle cx="280" cy="360" r="8" fill="#404858" stroke="#2a3040" stroke-width="1.5"/>

  <!-- ===== BED RAIL AT TOP ===== -->
  <!-- Bed side rails visible at top -->
  <rect x="74" y="88" width="412" height="20" rx="4" fill="#9aaabf" stroke="#7a8aa8" stroke-width="1.5"/>
  <rect data-area="Bed Rail" x="74" y="88" width="412" height="20" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>

  <!-- ===== TAILGATE (single full-width panel) ===== -->
  <!-- Tailgate panel -->
  <rect x="74" y="108" width="412" height="198" rx="4" fill="#c0cede" stroke="#9aaabf" stroke-width="1.5"/>
  <rect data-area="Tailgate" x="74" y="108" width="412" height="198" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>
  <!-- Tailgate horizontal crease -->
  <line x1="76" y1="188" x2="484" y2="188" stroke="#9aaabf" stroke-width="1.5" opacity="0.6"/>
  <!-- Tailgate vertical detail lines -->
  <line x1="200" y1="110" x2="200" y2="304" stroke="#a8b8cc" stroke-width="1" opacity="0.3"/>
  <line x1="360" y1="110" x2="360" y2="304" stroke="#a8b8cc" stroke-width="1" opacity="0.3"/>
  <!-- Tailgate handle -->
  <rect x="220" y="195" width="120" height="14" rx="7" fill="#7a8a9a" stroke="#5a6a7a" stroke-width="1.5"/>
  <rect x="226" y="198" width="108" height="8" rx="4" fill="#6a7a8a"/>
  <!-- Tailgate lock -->
  <circle cx="280" cy="202" r="5" fill="#5a6a7a"/>

  <!-- ===== TAIL LIGHTS (wider, truck-style) ===== -->
  <rect data-area="Taillight (L)" x="68" y="96" width="28" height="80" rx="5" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="70" y="98" width="24" height="78" rx="4" fill="#cc1818" stroke="#991010" stroke-width="1.5"/>
  <rect x="72" y="100" width="20" height="34" rx="2" fill="#ff3030" opacity="0.7"/>
  <rect x="72" y="136" width="20" height="18" rx="2" fill="#ff8800" opacity="0.65"/>
  <rect x="72" y="156" width="20" height="18" rx="2" fill="#ff3838" opacity="0.5"/>

  <rect data-area="Taillight (R)" x="464" y="96" width="28" height="80" rx="5" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="466" y="98" width="24" height="78" rx="4" fill="#cc1818" stroke="#991010" stroke-width="1.5"/>
  <rect x="468" y="100" width="20" height="34" rx="2" fill="#ff3030" opacity="0.7"/>
  <rect x="468" y="136" width="20" height="18" rx="2" fill="#ff8800" opacity="0.65"/>
  <rect x="468" y="156" width="20" height="18" rx="2" fill="#ff3838" opacity="0.5"/>

  <!-- Reverse lights -->
  <rect data-area="Reverse Light (L)" x="96" y="270" width="60" height="22" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="98" y="272" width="56" height="18" rx="3" fill="#e0e8f8" stroke="#a0b0c8" stroke-width="1"/>

  <rect data-area="Reverse Light (R)" x="404" y="270" width="60" height="22" rx="4" fill="rgba(255,255,255,0)" stroke="none"/>
  <rect x="406" y="272" width="56" height="18" rx="3" fill="#e0e8f8" stroke="#a0b0c8" stroke-width="1"/>

  <!-- ===== WHEELS ===== -->
  <circle cx="90" cy="350" r="46" fill="url(#prtire)" stroke="#181818" stroke-width="2"/>
  <circle cx="90" cy="350" r="32" fill="#2a2a2a"/>
  <circle cx="90" cy="350" r="23" fill="url(#prhub)"/>
  <circle cx="90" cy="350" r="7" fill="#aaa"/>
  <circle data-area="Rear Left Wheel" cx="90" cy="350" r="46" fill="rgba(255,255,255,0)" stroke="none"/>

  <circle cx="470" cy="350" r="46" fill="url(#prtire)" stroke="#181818" stroke-width="2"/>
  <circle cx="470" cy="350" r="32" fill="#2a2a2a"/>
  <circle cx="470" cy="350" r="23" fill="url(#prhub)"/>
  <circle cx="470" cy="350" r="7" fill="#aaa"/>
  <circle data-area="Rear Right Wheel" cx="470" cy="350" r="46" fill="rgba(255,255,255,0)" stroke="none"/>
</svg>
