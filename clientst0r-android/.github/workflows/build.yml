name: Android CI

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # -------------------------------------------------------------------- #
      # Checkout                                                               #
      # -------------------------------------------------------------------- #
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------- #
      # Java                                                                   #
      # -------------------------------------------------------------------- #
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # -------------------------------------------------------------------- #
      # Gradle — setup-gradle handles wrapper JAR bootstrap + caching        #
      # -------------------------------------------------------------------- #
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper          # use version declared in wrapper properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      # -------------------------------------------------------------------- #
      # Firebase — inject google-services.json from repo secret              #
      # Store the full JSON content as the secret GOOGLE_SERVICES_JSON        #
      # -------------------------------------------------------------------- #
      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      # -------------------------------------------------------------------- #
      # Debug build (all branches / PRs)                                      #
      # -------------------------------------------------------------------- #
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk

      # -------------------------------------------------------------------- #
      # Release build (version tags only)                                     #
      #                                                                       #
      # Required secrets:                                                     #
      #   KEYSTORE_BASE64     — base64-encoded .jks file                     #
      #   KEYSTORE_PROPERTIES — contents of keystore.properties              #
      # -------------------------------------------------------------------- #
      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64:    ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PROPERTIES: ${{ secrets.KEYSTORE_PROPERTIES }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          echo "$KEYSTORE_PROPERTIES" > keystore.properties

      - name: Build release AAB
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload release AAB
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/*.aab
